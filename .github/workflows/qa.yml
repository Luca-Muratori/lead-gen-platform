name: QA Environment Check

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      # Use Dummy values for the build check
      DATABASE_URL: "mongodb+srv://dummy:dummy@cluster.mongodb.net/qa?retryWrites=true&w=majority"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NODE_ENV: "production"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Force Tailwind Install in Storefront
        # This ensures the plugin is physically present where Turbopack looks
        run: npm install @tailwindcss/postcss postcss autoprefixer -w storefront
      
      - name: Force Tailwind Install in Dashboard
        # This ensures the plugin is physically present where Turbopack looks
        run: npm install @tailwindcss/postcss postcss autoprefixer -w dashboard

      - name: Generate Prisma Client
        run: npx prisma generate --schema=./packages/shared/prisma/schema.prisma

      - name: Run Lint
        # Using 'next lint' is more reliable for Next.js apps in CI
        run: |
          npm run lint -w storefront
          npm run lint -w dashboard

      - name: Build Storefront (QA Check)
        run: npm run build -w storefront

      - name: Build Dashboard (QA Check)
        run: npm run build -w dashboard